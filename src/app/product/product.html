<div class="container mt-4">
  <h2 class="mb-4">All Products</h2>
  <div class="row">
    <div class="col-md-3 mb-4" *ngFor="let product of products">
      <div class="card product-card h-100 shadow-sm">
        <img [src]="product.image" class="card-img-top product-image" alt="{{ product.title }}">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ product.title | slice:0:20 }}...</h5>
          <p class="card-text text-success font-weight-bold">${{ product.price }}</p>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-primary btn-sm" [routerLink]="['/product-detail', product.id]">View Details</button>
            <button class="btn btn-primary btn-sm" (click)="addToCart(product)">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
